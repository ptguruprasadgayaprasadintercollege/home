<head>

    <meta name="robots" content="index, follow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://ptguruprasadgayaprasadintercollege.github.io/home/index.html">

    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="Pt Guruprasad Gayaprasad Inter College | Kanpur">

        content="Learn more about admissions, courses, and facilities at Pt Guruprasad Gayaprasad Inter College.">

    <meta name="twitter:image"
        content="https://ptguruprasadgayaprasadintercollege.github.io/home/images/school_building.jpg">

    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media_query.css">
    <link rel="stylesheet" href="amimation.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
        integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div id="header"></div>

    <main>
        <main>

            <div class="heading">
                <h1>Fee Structure</h1>
            </div>

            <div class="fee_heading">
                <h1>Academic Fee</h1>
            </div>

            <div class="fee_section">

                <div id="academicFeeTable">
                    Loading...
                </div>

            </div>

            <div class="fee_heading">
                <h1>Hostel Fee</h1>
            </div>

            <div class="fee_section">

                <div id="hostelFeeTable">
                    Coming Soon
                </div>

            </div>

            <div class="fee_heading">
                <h1>Transportation Fee</h1>
            </div>

            <div class="fee_section">

                <div id="transportFeeTable">
                    Coming Soon
                </div>

            </div>

        </main>

    </main>
    <div id="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="key.js"></script>
    <script>

        async function loadAcademicFee() {

            const { data, error } =
                await supabaseClient
                    .from("academic_fees")
                    .select("*")
                    .order("id");

            if (error) {
                console.log(error);
                return;
            }

            const container =
                document.getElementById(
                    "academicFeeTable"
                );

            let html = `

    <table class="fee-table">

    <thead>

    <tr>

    <th>CLASS</th>

    <th>
    April
    <br>
    (Development Fee + Academic Fee)
    </th>

    <th>Total</th>

    <th>May</th>
    <th>June</th>
    <th>July</th>
    <th>Aug</th>
    <th>Sept</th>
    <th>Oct</th>
    <th>Nov</th>
    <th>Dec</th>
    <th>Jan</th>
    <th>Feb</th>
    <th>March</th>

    </tr>

    </thead>

    <tbody>

    `;

            data.forEach(fee => {

                if (fee.class_name === "Nursery") {

                    html += `
        <tr>
            <td colspan="14" class="fee-group">
                FEE Structure Nursery TO CLASS-5
            </td>
        </tr>
        `;
                }

                if (fee.class_name === "Class 6") {

                    html += `
        <tr>
            <td colspan="14" class="fee-group">
                FEE Structure CLASS-6 TO CLASS-12
            </td>
        </tr>
        `;
                }


                html += `

        <tr>

        <td>${fee.class_name}</td>

        <td>${fee.april || ""}</td>

        <td>${fee.total || ""}</td>

        <td>${fee.may || ""}</td>

        <td>${fee.june || ""}</td>

        <td>${fee.july || ""}</td>

        <td>${fee.august || ""}</td>

        <td>${fee.september || ""}</td>

        <td>${fee.october || ""}</td>

        <td>${fee.november || ""}</td>

        <td>${fee.december || ""}</td>

        <td>${fee.january || ""}</td>

        <td>${fee.february || ""}</td>

        <td>${fee.march || ""}</td>

        </tr>

        `;
            });

            html += `
    </tbody>
    </table>
    `;

            container.innerHTML = html;
        }

        loadAcademicFee();

    </script>
    <script>
        fetch("footer.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("footer").innerHTML = data;
            });
        fetch("header.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("header").innerHTML = data;
            });
    </script>
    <script src="script.js"></script>
</body>

</html>

    <script>
        const SUPABASE_URL = "https://lfmhxdfkxjrqdisgktys.supabase.co";
        const SUPABASE_KEY = "sb_publishable_EsPyBtXi8KjvHQ2LToCvTA_aQv2ldqH";

        const supabaseClient =
            supabase.createClient(
                SUPABASE_URL,
                SUPABASE_KEY
            );

        async function loadTeachers() {

            const { data, error } =
                await supabaseClient
                    .from("teachers")
                    .select("*");

            if (error) {
                console.log(error);
                return;
            }

            const container =
                document.getElementById("faculty-container");

            container.innerHTML = "";

            data.forEach(teacher => {

                container.innerHTML += `
        <div class="faculty_img img autoshow">
            <img src="${teacher.photo_url}" alt="${teacher.name}">
            <h1>${teacher.name}</h1>
            <p>(${teacher.subject})</p>
        </div>
        `;
            });
        }

        loadTeachers();
    </script>

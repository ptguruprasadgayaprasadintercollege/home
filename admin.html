<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pt Guruprasad Gayaprasad Inter College | Kanpur</title>
    <meta name="description"
        content="Official website of Pt Guruprasad Gayaprasad Inter College, Kanpur. Explore admissions, courses, facilities, and contact details.">
    <meta name="keywords"
        content="Pt Guruprasad Gayaprasad Inter College, Kanpur, school, admission, courses, facilities, contact">
    <meta name="robots" content="index, follow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://ptguruprasadgayaprasadintercollege.github.io/home/index.html">

    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="Pt Guruprasad Gayaprasad Inter College | Kanpur">
    <meta property="og:description"
        content="Learn more about admissions, courses, and facilities at Pt Guruprasad Gayaprasad Inter College.">
    <meta property="og:url" content="https://ptguruprasadgayaprasadintercollege.github.io/home/index.html">
    <meta property="og:image"
        content="https://ptguruprasadgayaprasadintercollege.github.io/home/images/school_building.jpg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Pt Guruprasad Gayaprasad Inter College | Kanpur">
    <meta name="twitter:description" content="Official website of Pt Guruprasad Gayaprasad Inter College.">
    <meta name="twitter:image"
        content="https://ptguruprasadgayaprasadintercollege.github.io/home/images/school_building.jpg">

    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media_query.css">
    <link rel="stylesheet" href="amimation.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
        integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div id="header"></div>
    <div class="logout_section">
        <div class="change-password">

            <h2>Change Password</h2>

            <div class="password-box">
                <input type="password" id="newPassword" placeholder="New Password">
                <i class="fa-solid fa-eye" id="togglePassword"></i>
            </div>

            <button onclick="changePassword()">
                Update Password
            </button>
            <p>or</p>
            <button onclick="logoutAdmin()">
                Logout
            </button>
        </div>
    </div>

    <div class="admin">


        <div class="teacher">

            <div class="heading">
                <h1>Add Teacher</h1>
            </div>

            <div class="teacher_addition">
                <form id="teacherForm" class="teacher_form">
                    <input type="text" id="name" placeholder="Teacher Name" required>
                    <input type="text" id="subject" placeholder="Subject" required>
                    <input type="file" id="photo" accept="image/*" required>
                    <button type="submit">Add Teacher</button>
                </form>
            </div>
            <div class="teacher_list">
                <div>
                    <h1 class="autoshow">All Teachers List</h1>
                </div>
                <div id="teachers-list" class="teachers-grid">
                </div>
            </div>
        </div>

        <!-- Section for fee -->

        <div class="fee">
            <h1>Academic Fee Management</h1>
            <div id="feeTableAdmin" class="fee-table, fee_section">
            </div>
        </div>

    </div>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="key.js"></script>
    <script src="admin.js"></script>
    <script>
        fetch("footer.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("footer").innerHTML = data;
            });
        fetch("header.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("header").innerHTML = data;
            });
    </script>
    <script src="script.js"></script>

</body>

</html>
